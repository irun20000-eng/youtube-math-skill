name: 자동 카탈로그 갱신 (수동 트리거 전용 - 2026-05-14 비활성화)

# 이 워크플로우는 main push에 자동 트리거되면서 [skip ci] commit을 만들어
# deploy-pages.yml 워크플로우를 가로채는 부작용이 있어, 자동 트리거를 비활성화.
# 카탈로그 재생성은 사용자 push 측(youtube-math-auto/scripts/regen_index.py)에서 수행.
# 필요 시 GitHub Actions UI 에서 수동 실행만 가능.

on:
  workflow_dispatch:

jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regen INDEX.md + index.html
        run: python youtube-math-auto/scripts/regen_index.py output/

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/INDEX.md output/index.html
          if git diff --cached --quiet; then
            echo "No catalog changes"
          else
            git commit -m "[bot] 카탈로그 수동 갱신"
            git push
          fi
