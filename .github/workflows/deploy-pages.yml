name: GitHub Pages 배포

# output/ 디렉토리를 GitHub Pages로 자동 배포
# 모바일 브라우저에서 https://<user>.github.io/<repo>/ 로 갤러리 접근 가능

on:
  push:
    branches: [main]
    paths:
      - 'output/**'
  workflow_dispatch:  # 수동 트리거 가능

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # output/ 전체를 Pages 루트로 게시
          # → https://<user>.github.io/<repo>/index.html 가 갤러리
          path: './output'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
