name: Issue → 학습자료 자동 추가

# "add-lesson" 라벨이 붙은 Issue 가 열리면 자동으로:
# 1. Issue body 파싱 → HTML 파일을 정확한 디렉토리에 저장
# 2. INDEX.md + index.html 갱신
# 3. commit + push (Pages 자동 배포)
# 4. Issue 에 완료 댓글 + 자동 close

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'add-lesson')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Process issue body
        id: process
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/process_issue.py

      - name: Regen catalog (INDEX.md + index.html)
        run: python youtube-math-auto/scripts/regen_index.py output/

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "변경 사항 없음"
            exit 1
          fi
          git commit -m "[bot] Issue #${{ github.event.issue.number }} → ${{ steps.process.outputs.filename }} [skip ci]"
          git push

      - name: Comment on issue (success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const path = '${{ steps.process.outputs.path }}';
            const filename = '${{ steps.process.outputs.filename }}';
            const grade = '${{ steps.process.outputs.grade }}';
            const unit = '${{ steps.process.outputs.unit }}';
            const galleryUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/`;
            const fileUrl = `${galleryUrl}${path.replace(/^output\//, '')}`;
            const body = [
              `✅ **학습자료가 갤러리에 추가되었습니다!**`,
              ``,
              `- 📁 경로: \`${path}\``,
              `- 📚 학년/단원: ${grade} / ${unit}`,
              `- 🌐 갤러리: ${galleryUrl}`,
              `- 📄 직접 보기: ${fileUrl}`,
              ``,
              `1~2분 후 GitHub Pages 배포가 완료되면 모바일에서 확인 가능합니다. 학생 공유 시 위 링크를 사용하세요.`,
              ``,
              `_이 Issue 는 자동으로 닫힙니다. 나중에 자료를 수정하려면 해당 파일을 직접 편집하세요._`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });

      - name: Comment on issue (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `❌ **학습자료 처리 실패**`,
              ``,
              `자동 처리 중 오류가 발생했습니다. 다음을 확인해주세요:`,
              `- 모든 폼 칸이 채워졌는지 (학년/단원/주제/영상ID/HTML)`,
              `- HTML 코드가 \`<!DOCTYPE html>\` 로 시작하는 완전한 문서인지`,
              `- 영상 ID 가 정확히 11자인지`,
              ``,
              `상세 로그: ${runUrl}`,
              ``,
              `문제 수정 후 Issue 를 **편집**(연필 아이콘)하면 자동으로 재시도됩니다.`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
